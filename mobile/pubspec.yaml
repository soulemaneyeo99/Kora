name: kora
description: "KORA Finance — coaching financier comportemental (Côte d'Ivoire)."
publish_to: "none"
version: 0.1.3+4

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (CDC : Riverpod MVVM)
  flutter_riverpod: ^2.6.1

  # Navigation déclarative + deep links (CDC : GoRouter)
  go_router: ^14.6.2

  # Client HTTP vers le backend FastAPI
  dio: ^5.7.0

  # Stockage sécurisé du JWT
  flutter_secure_storage: ^9.2.2

  # Polices Poppins + Inter (charte) sans bundler les .ttf
  google_fonts: ^6.2.1

  # Formatage des montants FCFA / dates
  intl: ^0.20.2

  # Graphiques camembert / barres (dashboard + analyse)
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Génère les icônes launcher Android/iOS à partir d'une image source.
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# Configuration des icônes launcher.
# Lancer après modif : dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/logo_kora.jpeg"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#0F6E56"
  adaptive_icon_foreground: "assets/images/logo_kora.jpeg"
