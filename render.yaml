# Blueprint Render — deploiement automatique du backend KORA Finance.
#
# Apres avoir push sur GitHub :
#   1. Render Dashboard -> "New" -> "Blueprint"
#   2. Connecte ton repo, Render lit ce fichier
#   3. Renseigne les env vars marquees sync: false (REDIS_URL, etc.)
#   4. Deploy

services:
  - type: web
    name: kora-backend
    runtime: python
    region: frankfurt # plus proche de la Cote d'Ivoire
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: bash start.sh
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG_OTP
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: JWT_SECRET
        generateValue: true # Render genere un secret aleatoire
      - key: DATABASE_URL
        fromDatabase:
          name: kora-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false # = a remplir dans le dashboard (URL Upstash rediss://...)
      - key: AT_API_KEY
        sync: false # vide pour LoggingSmsProvider (OTP visible dans Render logs)
      - key: AT_USERNAME
        value: sandbox
      - key: AT_SENDER_ID
        value: KORA
      - key: DEFAULT_PHONE_REGION
        value: CI
      - key: COMMISSION_RATE
        value: "0.005"

databases:
  - name: kora-postgres
    databaseName: kora
    user: kora_user
    region: frankfurt
    plan: free
    postgresMajorVersion: "16"
